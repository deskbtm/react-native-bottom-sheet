name: Feature request
description: Suggest an idea or improvement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. Check [CONTEXT.md](https://github.com/deskbtm/react-native-bottom-sheet/blob/main/CONTEXT.md) and open ADRs for existing design decisions.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is missing or painful today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This affects public API (`present` options, exports, etc.)
        - label: This affects performance contracts (Tracks A–D)
        - label: I am willing to open a PR
