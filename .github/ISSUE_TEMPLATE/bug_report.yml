name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search [existing issues](https://github.com/deskbtm/react-native-bottom-sheet/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Wrap app with BottomSheetProvider
        2. Call present(...)
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.0.1
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - Multiple
    validations:
      required: true

  - type: input
    id: expo-sdk
    attributes:
      label: Expo SDK
      placeholder: e.g. 56
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: React Native version, device/simulator, OS version
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots
    validations:
      required: false
